apiVersion: apps/v1
kind: Deployment

metadata:
  name: customerapi

spec:
  replicas: 1

  selector:
    matchLabels:
      app: customerapi

  template:
    metadata:
      labels:
        app: customerapi

    spec:
      containers:
        - name: customerapi

          image: varshithreddy144/customerapi:25600895525

          ports:
            - containerPort: 7003

---
apiVersion: v1
kind: Service

metadata:
  name: customerapi-service

spec:
  selector:
    app: customerapi

  ports:
    - protocol: TCP
      port: 7003
      targetPort: 7003

  type: ClusterIP